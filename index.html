<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</title>فرحه الديزل</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff5f9e,#ffc371);
    padding:40px 20px;
}

.card{
    max-width:700px;
    margin:auto;
    background:#ffffffdd;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    color:#ff4d6d;
    font-size:42px;
    margin-bottom:25px;
}

.photo-box{
    margin:20px 0 30px;
}

.photo-box img{
    width:100%;
    max-width:350px;
    height:auto;
    display:block;
    margin:auto;
    border-radius:20px;
    border:5px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.message{
    color:#333;
    font-size:24px;
    line-height:2;
    margin-top:15px;
}

.signature{
    margin-top:35px;
    font-size:30px;
    font-weight:bold;
    color:#000;
}

.invitation{
    margin-top:25px;
    padding:15px;
    background:#ffe8a1;
    border-radius:15px;
    color:#000;
    font-size:24px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h1>الديزل بيفرح الدعوه عامه للجميع
    </h1>

<div class="photo-box">
    <img src="mooo..jpg" alt="الصورة">
</div>

<div class="message">
    بكل الحب والتقدير،<br>
    ألف مبروك يا ديزل، وأسأل الله أن يجعل أيامك كلها سعادة وفرحة，
    وأن يرزقك الخير والتوفيق في كل خطوة.
    <br><br>
    🌹 عقبالك دائمًا في كل خير وسعادة. 🌹
</div>

<div class="signature">
لو جيت هتشوف مجتش هتسمع ❤️<br>
</div>

<div class="invitation">
💐 الدعوة عامة للجميع 💐
</div>

</div>

</body>
</html>
